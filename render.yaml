services:
  - type: web
    name: aetherium-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx tsx server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aetherium-db
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_API_URL
        sync: false
